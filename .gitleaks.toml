# .gitleaks.toml - gitleaks config (replaces hooks/secret-scan.js).
# Uses the full default ruleset (100+ high-precision detectors) and layers a small allowlist.
# Inline exception on a line:  gitleaks:allow   (legacy `secret-scan:allow` also honored below).

title = "llm-dev-harness gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "harness allowlist"
# Backward-compat with the old inline marker + honor gitleaks-native one.
regexes = [
  '''secret-scan:allow''',
  '''gitleaks:allow''',
]
# Design mockups and test fixtures are illustrative, not real credentials.
paths = [
  '''(^|/)design/mockups/''',
  '''(^|/)hooks/.*test.*''',
]
