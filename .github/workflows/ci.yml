name: verify
# CI mirror of the local harness — the SAME checks, server-side where local hooks and
# `--no-verify` cannot skip them. The job id `verify` is the context referenced by the
# branch ruleset (.github/rulesets/main.json -> required_status_checks). Renaming the job
# means updating the ruleset too.
#
# On GitHub Free + private this workflow RUNS and reports status but cannot be *required*
# (rulesets need Pro/Team or a public repo — see BACKLOG P0-0).
#
# NOTE: actions are pinned to major-version tags; pin to full commit SHAs per
# supply-chain best practice (BACKLOG P1-9). Dependabot keeps them current.

on:
  # push только на main (пост-merge контроль); ветки проверяются через PR —
  # иначе каждый PR-коммит гоняет CI дважды (push + pull_request).
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read # gitleaks-action читает список коммитов PR (GET /pulls/{n}/commits)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Secrets — gitleaks. Scans diff on PRs, full history otherwise.
      # GITHUB_TOKEN обязателен с gitleaks-action@v2 для сканирования PR (иначе шаг падает).
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # Conventional Commits across the PR's commits — cocogitto (`cog check`).
      - name: Conventional commits (cocogitto)
        if: github.event_name == 'pull_request'
        uses: cocogitto/cocogitto-action@v3

      # Executable VERIFY: auto-detects stacks and runs lint/build/test fail-fast.
      # For this repo that runs the harness self-test suite (node hooks/test.js).
      - name: VERIFY (verify.js)
        run: node hooks/verify.js

      # DESIGN-gate: UI changes require an approved mockup set touched in the same diff.
      - name: DESIGN-gate
        if: github.event_name == 'pull_request'
        run: node hooks/design-gate.js --base ${{ github.event.pull_request.base.sha }}
