name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate merged tag and source
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git fetch origin main --tags
          node hooks/release-preflight.js --tag $env:TAG --base origin/main --require-tag-in-base --require-release-tip --allow-remote-tag
          node hooks/verify.js --mode release

      - name: Build Papercuts release digest
        id: papercuts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $digest = Join-Path $env:RUNNER_TEMP "papercuts-$env:TAG.md"
          node scripts/papercuts-release.js --input .papercuts.jsonl --output $digest --tag $env:TAG --repository $env:GITHUB_REPOSITORY
          "digest=$digest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build source ZIP and checksum
        id: package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $repoName = ($env:GITHUB_REPOSITORY -split "/")[-1]
          $name = "$repoName-$env:TAG"
          $zip = Join-Path $env:RUNNER_TEMP "$name.zip"
          $checksum = "$zip.sha256"
          git archive --format=zip --prefix="$name/" -o $zip $env:TAG
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          Set-Content -Encoding ascii -LiteralPath $checksum -Value "$hash  $([IO.Path]::GetFileName($zip))"
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "checksum=$checksum" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Smoke-test source ZIP
        env:
          TAG: ${{ github.ref_name }}
          ZIP_PATH: ${{ steps.package.outputs.zip }}
          ARCHIVE_NAME: ${{ steps.package.outputs.name }}
        run: |
          $smokeRoot = Join-Path $env:RUNNER_TEMP "release-smoke"
          Expand-Archive -LiteralPath $env:ZIP_PATH -DestinationPath $smokeRoot
          $source = Join-Path $smokeRoot $env:ARCHIVE_NAME
          Push-Location $source
          if (-not (Select-String -LiteralPath CHANGELOG.md -SimpleMatch "## [$env:TAG]" -Quiet)) {
            throw "CHANGELOG.md does not contain $env:TAG"
          }
          git init -q -b main
          git config user.name "Release Smoke Test"
          git config user.email "release-smoke@example.test"
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          git add .
          git commit -q -m "chore: smoke test $env:TAG source archive"
          node hooks/doctor.js
          node hooks/verify.js --mode release
          node hooks/new-mockups.js --help
          $digest = Join-Path $env:RUNNER_TEMP "papercuts-smoke-$env:TAG.md"
          node scripts/papercuts-release.js --input .papercuts.jsonl --output $digest --tag $env:TAG --repository $env:GITHUB_REPOSITORY
          if (-not (Select-String -LiteralPath $digest -SimpleMatch "# Papercuts snapshot for $env:TAG" -Quiet)) {
            throw "Papercuts release digest was not generated"
          }
          Pop-Location

      - name: Record published artifact evidence
        id: evidence
        env:
          TAG: ${{ github.ref_name }}
          ZIP_PATH: ${{ steps.package.outputs.zip }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum }}
        run: |
          $evidencePath = Join-Path $env:RUNNER_TEMP "release-evidence.json"
          $evidence = @{
            schemaVersion = 1
            tag = $env:TAG
            artifacts = @(@{
              id = "source-zip-and-sha256"
              assetPath = [IO.Path]::GetFileName($env:ZIP_PATH)
              checksumPath = [IO.Path]::GetFileName($env:CHECKSUM_PATH)
              workflowUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
              releaseUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/releases/tag/$env:TAG"
              smokePassed = $true
              version = $env:TAG.Substring(1)
            })
          }
          $evidence | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 -LiteralPath $evidencePath
          "path=$evidencePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ZIP_PATH: ${{ steps.package.outputs.zip }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum }}
          EVIDENCE_PATH: ${{ steps.evidence.outputs.path }}
          PAPERCUTS_PATH: ${{ steps.papercuts.outputs.digest }}
        run: |
          gh release view $env:TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $env:ZIP_PATH $env:CHECKSUM_PATH $env:EVIDENCE_PATH --clobber
          } else {
            gh release create $env:TAG $env:ZIP_PATH $env:CHECKSUM_PATH $env:EVIDENCE_PATH --verify-tag --title $env:TAG --generate-notes
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $marker = "<!-- papercuts-release-digest -->"
          $body = (gh release view $env:TAG --json body --jq .body) -join [Environment]::NewLine
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not $body.Contains($marker)) {
            $digest = Get-Content -Raw -LiteralPath $env:PAPERCUTS_PATH
            $notes = Join-Path $env:RUNNER_TEMP "release-notes-$env:TAG.md"
            Set-Content -Encoding utf8 -LiteralPath $notes -Value $body
            Add-Content -Encoding utf8 -LiteralPath $notes -Value "`n$marker`n$digest"
            gh release edit $env:TAG --notes-file $notes
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
