name: branch-cleanup

on:
  workflow_run:
    workflows: ["verify"]
    types: [completed]

permissions:
  contents: write
  pull-requests: read
  checks: read

jobs:
  cleanup:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: "22"

      - name: Delete verified merged development branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.event.workflow_run.head_sha }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: >-
          node hooks/github-branch-cleanup.js
          --merge-sha $env:MERGE_SHA
          --repository $env:GITHUB_REPOSITORY
          --base $env:BASE_BRANCH
          --required-check verify
          --apply
